<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="search">検索</button>
      <button class="tab-btn" data-tab="results">結果 <span id="result-count">0</span></button>
      <button class="tab-btn" data-tab="settings">設定</button>
    </div>

    <!-- 検索タブ -->
    <div id="tab-search" class="tab-content active">
      <div class="form-group">
        <label>基準地点（住所・駅名）1行1地点</label>
        <textarea id="areas" rows="2" placeholder="例：東京都新宿区西新宿1-1-1"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>目的</label>
          <select id="purpose">
            <option value="面接会場">面接会場</option>
            <option value="研修室">研修室</option>
            <option value="会議室">会議室</option>
            <option value="セミナー会場">セミナー</option>
            <option value="イベント会場">イベント</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group half">
          <label>予算（円/時）</label>
          <input type="number" id="budget" value="2000" step="100">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>人数</label>
          <input type="number" id="capacity" value="2" min="1">
        </div>
        <div class="form-group half">
          <label>終日（時間）</label>
          <input type="number" id="fullday-hours" value="8" min="1" max="24">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>追加キーワード</label>
          <input type="text" id="extra-keywords" placeholder="個室 WiFi">
        </div>
        <div class="form-group quarter">
          <label>間隔(秒)</label>
          <input type="number" id="request-delay" value="3" min="1" max="30">
        </div>
        <div class="form-group quarter">
          <label>最大件数</label>
          <input type="number" id="max-fetch" value="20" min="1" max="100">
        </div>
      </div>

      <div class="btn-row">
        <button id="btn-search" class="btn-primary">施設を検索</button>
        <button id="btn-fetch-prices" class="btn-primary btn-phase2">料金を取得</button>
        <button id="btn-stop" class="btn-danger btn-stop" style="display:none;">中止</button>
      </div>

      <div id="search-status" class="status-area"></div>
    </div>

    <!-- 結果タブ -->
    <div id="tab-results" class="tab-content">
      <div class="results-toolbar">
        <button id="btn-export" class="btn-primary">Excel出力</button>
        <button id="btn-clear" class="btn-danger">全削除</button>
        <select id="filter-area">
          <option value="">全エリア</option>
        </select>
      </div>
      <div id="results-list" class="results-list"></div>
    </div>

    <!-- 設定タブ -->
    <div id="tab-settings" class="tab-content">
      <div class="form-group">
        <label>利用期間</label>
        <div class="form-row">
          <input type="date" id="period-start" class="half">
          <span>〜</span>
          <input type="date" id="period-end" class="half">
        </div>
      </div>

      <div class="form-group">
        <label>検索キーワード（1行1キーワード）</label>
        <textarea id="search-keywords" rows="10" placeholder="貸会議室&#10;レンタルスペース&#10;公民館"></textarea>
        <small>自動保存。空でデフォルトに戻ります</small>
      </div>

      <div class="form-group">
        <label>その他の条件</label>
        <textarea id="other-conditions" rows="2" placeholder="例：駐車場必須、WiFi必須"></textarea>
      </div>

      <button id="btn-save-settings" class="btn-secondary">設定を保存</button>
    </div>
  </div>

  <script src="../lib/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
